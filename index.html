<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>JOHN'S DREAM HOUSE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- <script src="./scripts/aframe.min.js"></script> -->
    <script src="./scripts/ada-water.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="grass" src="./textures/grass1.jpg" alt="" />
        <img id="sky" src="./textures/sunny-sky1.jpg" alt="" />
        <img id="house" alt="./assets/scene.gltf" />
        <!-- Preload car model -->
        <a-asset-item id="car" src="./car.glb"></a-asset-item>
      </a-assets>

      <!-- camera position -->
      <a-entity position="32 2 2">
        <a-camera></a-camera>
      </a-entity>

      <!-- Ambient Light -->
      <a-entity light="type: ambient;"></a-entity>

      <!-- Directional Light -->
      <a-entity
        light="type: directional; color: #EEE; intensity: 0.5"
        position="-1 1 0"
      ></a-entity>

      <a-sky
        src="./textures/sunny-sky.jpg"
        background-repeat="no-repeat"
        0rotation="0 64 0"
      ></a-sky>
      <a-plane
        material="src: #grass; repeat: 5000 5000"
        rotation="-90 0 0"
        scale="10000 10000 1"
        geometry=""
      ></a-plane>

      <!-- House -->
      <a-gltf-model
        position="38 0 5"
        scale="1 1 1"
        src="./assets/scene.gltf"
      ></a-gltf-model>

      <!-- Car parked in front of the house -->
      <a-gltf-model
        id="car-model"
        src="#car"
        position="32 0 5"
        scale="1 1 1"
        rotation="0 180 0"
      ></a-gltf-model>

      <!-- Swimming Pool -->
      <a-gltf-model
        id="pool"
        position="22.28631 -0.42242 -14.85678"
        scale="5 5 6"
        src="./swimming_pool/scene.gltf"
        gltf-model="./swimming_pool/scene.gltf"
        modify-materials
        geometry="primitive: box; width: 10; height: 0.5; depth: 5"
        material="color: blue; opacity: 0.5"
      ></a-gltf-model>

      <a-water
        opacity="40"
        side="double"
        width="2.1"
        base-color="lightblue"
        foam-color="blue"
        repeat="2"
        voronoi-points="5"
        rotation="90 0 0"
        position="22.335 0.200 -14.757"
        scale="2.6 1.1 1.0"
        animation="property: scale; dur: 50; loop: NaN; dir: alternate; easing: easeOutElastic"
        material="shader: water; transparent: true; repeat: 200 1; map: [object Object]; basecolor: lightblue"
      >
      </a-water>
    </a-scene>

    <script>
      AFRAME.registerComponent("modify-materials", {
        init: function () {
          this.el.addEventListener("model-loaded", () => {
            const obj = this.el.getObject3D("mesh");
            obj.traverse((node) => {
              if (node.isMesh) {
                node.material.color.set("black");
              }
            });
          });
        },
      });
    </script>

    <script>
      document.querySelector("a-water").setAttribute("animation", {
        property: "scale",
        dur: 150,
        loop: true,
        dir: "alternate",
        easing: "easeOutElastic",
      });
    </script>
  </body>
</html>
